spring:
  application:
    name: TalentPulse
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/talentpulse}
    username: ${SPRING_DATASOURCE_USERNAME:talentpulse}
    password: ${SPRING_DATASOURCE_PASSWORD:talentpulse}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

jwt:
  secret: ${JWT_SECRET:changeme-dev-secret-at-least-256-bits-long}
  expiration: 86400000

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
